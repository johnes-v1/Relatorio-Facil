<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Relatório Fácil</title>
</head>
<!-- Cabeçalho -->

<body class="home">
    <<div id="app">

        <!-- HEADER -->
        <div class="header">
            <img src="imagens/logo.png" class="logo-img">
            <h1>Relatório Fácil</h1>
        </div>

        <!-- INPUT -->
        <div class="card">
            <h3>📥 Envie seus dados de vendas</h3>
            <textarea id="inputData" placeholder="Ex: Produto A - 100, Produto B - 200"></textarea>
            <button onclick="gerarRelatorio()">Gerar relatório</button>
        </div>

        <!-- LOADING -->
        <div id="loading" style="display:none;">
            ⏳ Analisando dados...
        </div>

        <!-- RESULTADO -->
        <div class="card" id="resultado" style="display:none;">
            <h3>📊 Seu relatório</h3>
            <p id="total"></p>
            <p id="ticket"></p>
            <p id="top"></p>
        </div>

        <!-- WHATSAPP -->
        <a id="whatsappBtn" target="_blank" style="display:none;">
            📲 Receber no WhatsApp
        </a>

        </div>
</body>

</html>
